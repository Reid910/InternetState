services:
  postgres:
    image: ankane/pgvector
    container_name: internet_state_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-summarizer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
  worker:
    build: ./worker
    container_name: summarizer_worker
    restart: unless-stopped
    profiles: [worker]
    depends_on:
      - postgres
    environment:
      RUN_INTERVAL_MINUTES: "5"
      DATABASE_URL: postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-summarizer}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  api:
    build: ./api
    container_name: internet_state_api
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-summarizer}
  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://api:8000
    container_name: internet_state_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
